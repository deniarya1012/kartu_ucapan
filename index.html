<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kue Ulang Tahun Interaktif (3 Lilin)</title>
    <style>
        body {
            /* Mengubah background menjadi gradasi pink */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a4a4a;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 40px;
            text-align: center;
            font-size: 24px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.6);
        }

        /* Container Utama Kue */
        .cake-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container khusus untuk susunan 3 lilin */
        .candles-container {
            display: flex;
            gap: 12px; /* Jarak antar lilin */
            margin-bottom: -5px;
            z-index: 10;
        }

        /* Lilin */
        .candle {
            width: 14px;
            height: 50px;
            background: linear-gradient(to right, #e74c3c, #f1c40f, #e74c3c);
            border-radius: 4px / 10px;
            position: relative;
        }

        /* Variasi warna lilin kedua dan ketiga agar lebih menarik */
        .candle:nth-child(2) {
            background: linear-gradient(to right, #3498db, #2ecc71, #3498db);
        }
        .candle:nth-child(3) {
            background: linear-gradient(to right, #9b59b6, #f1c40f, #9b59b6);
        }

        /* Api Lilin */
        .flame {
            position: absolute;
            top: -23px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 24px;
            background: radial-gradient(ellipse at bottom, #f1c40f, #f39c12, transparent);
            border-radius: 50% 50% 20% 20% / 70% 70% 30% 30%;
            box-shadow: 0 0 10px #f1c40f, 0 0 20px #f39c12;
            animation: flicker 0.1s ease-in-out infinite alternate;
            transition: opacity 0.5s ease;
        }

        /* Animasi Api Goyang */
        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-48%) scale(1.05) skewX(2deg); }
        }

        /* State saat lilin mati */
        .flame.off {
            opacity: 0;
            animation: none;
        }

        /* Struktur Kue */
        .cake {
            width: 160px;
            height: 100px;
            background: #fff0f5; /* Warna krim putih susu */
            border-radius: 10px 10px 0 0;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }

        /* Krim Atas Kue */
        .cake::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background: #ff6b8b; /* Selai/krim pink stroberi */
            border-radius: 10px 10px 12px 12px;
        }

        /* Piring Kue */
        .plate {
            width: 220px;
            height: 15px;
            background: #ffffff;
            border-radius: 10px;
            margin-top: -5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        /* Tombol Izin Sensor */
        #start-btn {
            padding: 12px 26px;
            font-size: 16px;
            background-color: #ff6b8b;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 107, 139, 0.4);
            margin-top: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="status">Goyangkan HP untuk meniup lilinnya!</h1>

    <div class="cake-container">
        <div class="candles-container">
            <div class="candle"><div class="flame"></div></div>
            <div class="candle"><div class="flame"></div></div>
            <div class="candle"><div class="flame"></div></div>
        </div>
        <div class="cake"></div>
        <div class="plate"></div>
    </div>

    <button id="start-btn" onclick="requestMotionPermission()">Aktifkan Sensor</button>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // Mengambil seluruh elemen api lilin (total ada 3)
        const flames = document.querySelectorAll('.flame');
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');

        const SHAKE_THRESHOLD = 15; 
        let lastX = null, lastY = null, lastZ = null;

        function requestMotionPermission() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            initSensor();
                        } else {
                            alert("Izin sensor ditolak.");
                        }
                    })
                    .catch(console.error);
            } else {
                initSensor();
            }
        }

        function initSensor() {
            startBtn.style.display = 'none';
            statusText.innerHTML = "Sekarang, goyangin HPnya Sayaaaaaang! 👋";
            
            window.addEventListener('devicemotion', (event) => {
                let acceleration = event.accelerationIncludingGravity;
                
                let x = acceleration.x;
                let y = acceleration.y;
                let z = acceleration.z;

                if (lastX !== null) {
                    let deltaX = Math.abs(x - lastX);
                    let deltaY = Math.abs(y - lastY);
                    let deltaZ = Math.abs(z - lastZ);

                    if ((deltaX > SHAKE_THRESHOLD && deltaY > SHAKE_THRESHOLD) || deltaZ > SHAKE_THRESHOLD) {
                        extinguishCandles();
                    }
                }

                lastX = x;
                lastY = y;
                lastZ = z;
            });
        }

        function extinguishCandles() {
            flames.forEach(flame => {
                flame.classList.add('off');
            });
            statusText.innerHTML = "Selamat Ulang Tahun Sayaaaaangku! 🎉🎂🤍";

            // Memicu efek kembang api / confetti meriah
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });
        }
    </script>
</body>
</html>
